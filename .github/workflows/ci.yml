name: CI

on:
    push:
        branches: [master, main, develop]
    pull_request:
        branches: [master, main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - ros_distro: humble
                      os: ubuntu-22.04
                    - ros_distro: kilted
                      os: ubuntu-24.04

        container:
            image: ros:${{ matrix.ros_distro }}-ros-base

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  apt-get update
                  apt-get install -y wget

                  # Install wujihandcpp SDK (latest release including pre-release)
                  # Use grep to extract URL directly, avoiding jq parse issues with control chars
                  DEB_URL=$(curl -sH "Accept: application/vnd.github+json" \
                    https://api.github.com/repos/wuji-technology/wujihandpy/releases | \
                    grep -oP '"browser_download_url":\s*"\K[^"]*wujihandcpp[^"]*-amd64\.deb' | head -1)

                  if [ -z "$DEB_URL" ]; then
                    echo "Error: Failed to get wujihandcpp deb URL from GitHub releases"
                    exit 1
                  fi

                  echo "Installing wujihandcpp from: $DEB_URL"
                  wget -q "$DEB_URL" || { echo "Error: Failed to download $DEB_URL"; exit 1; }
                  dpkg -i --force-overwrite wujihandcpp-*.deb || true
                  apt-get install -f -y

                  # Install ROS dependencies
                  apt-get install -y \
                    ros-${{ matrix.ros_distro }}-sensor-msgs \
                    ros-${{ matrix.ros_distro }}-std-msgs \
                    ros-${{ matrix.ros_distro }}-robot-state-publisher \
                    ros-${{ matrix.ros_distro }}-xacro

            - name: Build
              run: |
                  source /opt/ros/${{ matrix.ros_distro }}/setup.bash
                  colcon build --symlink-install
              shell: bash

            - name: Test
              run: |
                  source /opt/ros/${{ matrix.ros_distro }}/setup.bash
                  source install/setup.bash
                  colcon test
                  colcon test-result --verbose
              shell: bash
              continue-on-error: true

    build-deb:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
        strategy:
            matrix:
                include:
                    - ros_distro: humble
                      os: ubuntu-22.04
                    - ros_distro: kilted
                      os: ubuntu-24.04

        container:
            image: ros:${{ matrix.ros_distro }}-ros-base

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  apt-get update
                  apt-get install -y wget dpkg-dev

                  # Install wujihandcpp SDK (latest release including pre-release)
                  # Use grep to extract URL directly, avoiding jq parse issues with control chars
                  DEB_URL=$(curl -sH "Accept: application/vnd.github+json" \
                    https://api.github.com/repos/wuji-technology/wujihandpy/releases | \
                    grep -oP '"browser_download_url":\s*"\K[^"]*wujihandcpp[^"]*-amd64\.deb' | head -1)

                  if [ -z "$DEB_URL" ]; then
                    echo "Error: Failed to get wujihandcpp deb URL from GitHub releases"
                    exit 1
                  fi

                  echo "Installing wujihandcpp from: $DEB_URL"
                  wget -q "$DEB_URL" || { echo "Error: Failed to download $DEB_URL"; exit 1; }
                  dpkg -i --force-overwrite wujihandcpp-*.deb || true
                  apt-get install -f -y

                  # Install ROS dependencies
                  apt-get install -y \
                    ros-${{ matrix.ros_distro }}-sensor-msgs \
                    ros-${{ matrix.ros_distro }}-std-msgs \
                    ros-${{ matrix.ros_distro }}-robot-state-publisher

            - name: Build deb package
              run: |
                  # Fix git dubious ownership error in CI
                  git config --global --add safe.directory "$GITHUB_WORKSPACE"

                  chmod +x build_deb.sh
                  ./build_deb.sh ${{ matrix.ros_distro }}

            - name: Upload deb artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ros-${{ matrix.ros_distro }}-wujihand-deb
                  path: ros-${{ matrix.ros_distro }}-wujihand_*.deb
                  retention-days: 30

    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install clang-format
              run: sudo apt-get update && sudo apt-get install -y clang-format

            - name: Check C++ formatting
              run: |
                  find . \( -name "*.cpp" -o -name "*.hpp" \) -print0 | xargs -0 -r clang-format --dry-run --Werror

    ci-gate:
        runs-on: ubuntu-latest
        needs: [build, build-deb, lint]
        if: always()
        steps:
            - name: Verify required CI jobs
              shell: bash
              run: |
                  set -euo pipefail

                  build_result="${{ needs.build.result }}"
                  build_deb_result="${{ needs['build-deb'].result }}"
                  lint_result="${{ needs.lint.result }}"

                  echo "build: ${build_result}"
                  echo "build-deb: ${build_deb_result}"
                  echo "lint: ${lint_result}"

                  failed=0

                  if [[ "${build_result}" != "success" ]]; then
                      echo "build did not pass"
                      failed=1
                  fi

                  if [[ "${lint_result}" != "success" ]]; then
                      echo "lint did not pass"
                      failed=1
                  fi

                  require_deb=false
                  if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref }}" == "refs/heads/main" || "${{ github.ref }}" == "refs/heads/master" ]]; then
                      require_deb=true
                  fi

                  if [[ "${require_deb}" == "true" ]]; then
                      if [[ "${build_deb_result}" != "success" ]]; then
                          echo "build-deb did not pass"
                          failed=1
                      fi
                  elif [[ "${build_deb_result}" != "success" && "${build_deb_result}" != "skipped" ]]; then
                      echo "build-deb finished with an unexpected result"
                      failed=1
                  fi

                  exit "${failed}"
