name: CI

on:
    push:
        branches: [master, main, develop]
    pull_request:
        branches: [master, main]
    workflow_dispatch:
        inputs:
            wujihandpy_ref:
                description: 'wujihandpy git ref to build SDK from'
                required: false
                default: ''

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - ros_distro: humble
                      os: ubuntu-22.04
                    - ros_distro: kilted
                      os: ubuntu-24.04

        container:
            image: ros:${{ matrix.ros_distro }}-ros-base

        steps:
            - name: Checkout wujihandros2
              uses: actions/checkout@v4
              with:
                  path: wujihandros2

            - name: Resolve wujihandpy ref
              id: sdk-ref
              shell: bash
              run: |
                  # PR builds need the matching SDK PR (the round-8 namespace
                  # rename + cdc transport stack hasn't landed on SDK main
                  # yet). Push, tag, and dispatch builds default to released
                  # SDK on main. Drop the pull_request branch once the SDK
                  # PR merges.
                  #
                  # The matching SDK work lives on the contributor fork
                  # (Shen-Jiewen/wujihandpy:feat/tactile-ros2), NOT on the
                  # upstream repo — the upstream wuji-technology/wujihandpy
                  # only has refs/pull/63/head until merge. Earlier this
                  # job pinned to wuji-technology + feat/tactile-ros2 and
                  # silently failed at checkout (branch did not exist).
                  # GitHub exposes the PR head SHA as the special ref
                  # `refs/pull/<N>/head` on the upstream repo, so we use
                  # that — stable for the lifetime of the PR, no fork
                  # access needed, no manual cherry-pick required.
                  INPUT="${{ github.event.inputs.wujihandpy_ref }}"
                  if [ -n "$INPUT" ]; then
                    REF="$INPUT"
                    REPO="wuji-technology/wujihandpy"
                  elif [ "${{ github.event_name }}" = "pull_request" ]; then
                    REF="refs/pull/63/head"
                    REPO="wuji-technology/wujihandpy"
                  else
                    REF="main"
                    REPO="wuji-technology/wujihandpy"
                  fi
                  echo "ref=${REF}" >> "$GITHUB_OUTPUT"
                  echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
                  echo "Using wujihandpy ${REPO}@${REF}"

            - name: Checkout wujihandpy SDK
              uses: actions/checkout@v4
              with:
                  repository: ${{ steps.sdk-ref.outputs.repo }}
                  ref: ${{ steps.sdk-ref.outputs.ref }}
                  path: wujihandpy
                  submodules: false

            - name: Install build deps
              shell: bash
              run: |
                  apt-get update
                  # GCC 13 for C++20 <format>; libusb-1.0 for the SDK transport.
                  # Ubuntu 22.04 default GCC is 11 which lacks <format>; 24.04 is 13.
                  apt-get install -y \
                      build-essential cmake ninja-build pkg-config \
                      gcc-13 g++-13 \
                      libusb-1.0-0-dev \
                      git
                  # ROS deps for the workspace itself.
                  apt-get install -y \
                      ros-${{ matrix.ros_distro }}-sensor-msgs \
                      ros-${{ matrix.ros_distro }}-std-msgs \
                      ros-${{ matrix.ros_distro }}-robot-state-publisher \
                      ros-${{ matrix.ros_distro }}-tf2-ros \
                      ros-${{ matrix.ros_distro }}-xacro

            - name: Build + install wujihandcpp from source
              shell: bash
              env:
                  CC: gcc-13
                  CXX: g++-13
              run: |
                  cd wujihandpy/wujihandcpp
                  cmake -B build-ci -G Ninja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DBUILD_STATIC_WUJIHANDCPP=ON \
                      -DWUJIHANDCPP_INSTALL=ON \
                      -DCMAKE_INSTALL_PREFIX=/opt/wujihandcpp
                  cmake --build build-ci -j"$(nproc)"
                  cmake --install build-ci

            - name: Build wujihandros2
              shell: bash
              env:
                  CC: gcc-13
                  CXX: g++-13
              run: |
                  source /opt/ros/${{ matrix.ros_distro }}/setup.bash
                  cd wujihandros2
                  colcon build --symlink-install \
                      --cmake-args -DCMAKE_PREFIX_PATH=/opt/wujihandcpp

            - name: Test wujihandros2
              shell: bash
              env:
                  CC: gcc-13
                  CXX: g++-13
              run: |
                  # `colcon test` exits 0 when no test packages exist, so
                  # this step is a no-op until tests are added — but the
                  # gate is in place so the moment a real failing test
                  # lands the workflow reports it. Earlier this step had
                  # `continue-on-error: true`, which would silently mask
                  # any future regression.
                  source /opt/ros/${{ matrix.ros_distro }}/setup.bash
                  cd wujihandros2
                  source install/setup.bash
                  colcon test
                  colcon test-result --verbose --all

    build-deb:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        strategy:
            matrix:
                include:
                    - ros_distro: humble
                      os: ubuntu-22.04
                    - ros_distro: kilted
                      os: ubuntu-24.04

        container:
            image: ros:${{ matrix.ros_distro }}-ros-base

        steps:
            - name: Checkout wujihandros2
              uses: actions/checkout@v4
              with:
                  path: wujihandros2

            - name: Resolve wujihandpy ref
              id: sdk-ref
              shell: bash
              run: |
                  # build-deb only runs on push to main/master and ships
                  # artifacts; default to released SDK on main.
                  REF="${{ github.event.inputs.wujihandpy_ref }}"
                  REF="${REF:-main}"
                  echo "ref=${REF}" >> "$GITHUB_OUTPUT"

            - name: Checkout wujihandpy SDK
              uses: actions/checkout@v4
              with:
                  repository: wuji-technology/wujihandpy
                  ref: ${{ steps.sdk-ref.outputs.ref }}
                  path: wujihandpy
                  submodules: false

            - name: Install build deps
              shell: bash
              run: |
                  apt-get update
                  apt-get install -y \
                      build-essential cmake ninja-build pkg-config \
                      gcc-13 g++-13 \
                      libusb-1.0-0-dev \
                      git dpkg-dev
                  apt-get install -y \
                      ros-${{ matrix.ros_distro }}-sensor-msgs \
                      ros-${{ matrix.ros_distro }}-std-msgs \
                      ros-${{ matrix.ros_distro }}-robot-state-publisher \
                      ros-${{ matrix.ros_distro }}-tf2-ros

            - name: Build + install wujihandcpp from source
              shell: bash
              env:
                  CC: gcc-13
                  CXX: g++-13
              run: |
                  cd wujihandpy/wujihandcpp
                  cmake -B build-ci -G Ninja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DBUILD_STATIC_WUJIHANDCPP=ON \
                      -DWUJIHANDCPP_INSTALL=ON \
                      -DCMAKE_INSTALL_PREFIX=/opt/wujihandcpp
                  cmake --build build-ci -j"$(nproc)"
                  cmake --install build-ci

            - name: Build deb package
              shell: bash
              env:
                  CC: gcc-13
                  CXX: g++-13
                  CMAKE_PREFIX_PATH: /opt/wujihandcpp
              run: |
                  cd wujihandros2
                  # Fix git dubious ownership in CI containers.
                  git config --global --add safe.directory "$PWD"
                  git submodule update --init --recursive

                  chmod +x build_deb.sh
                  ./build_deb.sh ${{ matrix.ros_distro }}

            - name: Upload deb artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ros-${{ matrix.ros_distro }}-wujihand-deb
                  path: wujihandros2/ros-${{ matrix.ros_distro }}-wujihand_*.deb
                  retention-days: 30

    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install clang-format
              run: sudo apt-get update && sudo apt-get install -y clang-format

            - name: Check C++ formatting
              run: |
                  # Run clang-format against the project's own C++ sources only.
                  # Restrict by package directory so the find never descends
                  # into git submodules under external/ (which carry their
                  # own style and would fail this check). The previous form
                  #   find . ... | head -20 | xargs ... || echo "..."
                  # both truncated to the first 20 hits and swallowed every
                  # non-zero exit, which made this step always green.
                  set -e
                  set -o pipefail
                  find wujihand_driver wujihand_tactile_driver \
                      wujihand_tactile_msgs wujihand_msgs wujihand_bringup \
                      \( -name "*.cpp" -o -name "*.hpp" \) -print0 \
                      | xargs -0 -r clang-format --dry-run --Werror
