name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            version:
                description: "Version to release (e.g., 0.1.0 or 0.2.0-rc0)"
                required: true
            wujihandpy_ref:
                description: "wujihandpy git ref to build SDK from"
                required: false
                default: ""

jobs:
    build-debs:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - ros_distro: humble
                      os_version: "22.04"
                    - ros_distro: kilted
                      os_version: "24.04"

        container:
            image: ros:${{ matrix.ros_distro }}-ros-base

        steps:
            - name: Checkout wujihandros2
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
                submodules: recursive
                path: wujihandros2

            - name: Extract version
              id: version
              run: |
                  if [ -n "${{ github.event.inputs.version }}" ]; then
                    VERSION="${{ github.event.inputs.version }}"
                  else
                    # Remove 'v' prefix from tag name
                    VERSION="${GITHUB_REF_NAME#v}"
                  fi
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Building version: ${VERSION}"

            - name: Resolve wujihandpy ref
              id: sdk-ref
              shell: bash
              run: |
                  # Tag-triggered releases ship user-facing debs and must
                  # link against released SDK on main. Override only via
                  # explicit workflow_dispatch input.
                  REF="${{ github.event.inputs.wujihandpy_ref }}"
                  REF="${REF:-main}"
                  echo "ref=${REF}" >> "$GITHUB_OUTPUT"

            - name: Checkout wujihandpy SDK
              uses: actions/checkout@v4
              with:
                  repository: wuji-technology/wujihandpy
                  ref: ${{ steps.sdk-ref.outputs.ref }}
                  path: wujihandpy
                  submodules: false

            - name: Install build deps
              shell: bash
              run: |
                  apt-get update
                  # gcc-13 not in default apt on Ubuntu 22.04 (Humble base image).
                  # Add the Ubuntu toolchain test PPA on Jammy; no-op on Noble.
                  apt-get install -y software-properties-common
                  if grep -q '22.04' /etc/os-release 2>/dev/null; then
                    add-apt-repository -y ppa:ubuntu-toolchain-r/test
                    apt-get update
                  fi
                  apt-get install -y \
                      build-essential cmake ninja-build pkg-config \
                      gcc-13 g++-13 \
                      libusb-1.0-0-dev \
                      git dpkg-dev
                  apt-get install -y \
                      ros-${{ matrix.ros_distro }}-sensor-msgs \
                      ros-${{ matrix.ros_distro }}-std-msgs \
                      ros-${{ matrix.ros_distro }}-robot-state-publisher \
                      ros-${{ matrix.ros_distro }}-tf2-ros

            - name: Build + install wujihandcpp from source
              shell: bash
              env:
                  CC: gcc-13
                  CXX: g++-13
              run: |
                  cd wujihandpy/wujihandcpp
                  cmake -B build-ci -G Ninja \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DBUILD_STATIC_WUJIHANDCPP=ON \
                      -DWUJIHANDCPP_INSTALL=ON \
                      -DCMAKE_INSTALL_PREFIX=/opt/wujihandcpp
                  cmake --build build-ci -j"$(nproc)"
                  cmake --install build-ci

            - name: Build deb package
              shell: bash
              env:
                  CC: gcc-13
                  CXX: g++-13
                  CMAKE_PREFIX_PATH: /opt/wujihandcpp
              run: |
                  cd wujihandros2
                  git config --global --add safe.directory "$PWD"
                  chmod +x build_deb.sh
                  ./build_deb.sh ${{ matrix.ros_distro }} ${{ steps.version.outputs.version }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ros-${{ matrix.ros_distro }}-wujihand-deb
                  path: wujihandros2/ros-${{ matrix.ros_distro }}-wujihand_*.deb

    release:
        needs: build-debs
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: List artifacts
              run: find artifacts -name "*.deb" -type f

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  files: artifacts/**/*.deb
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
